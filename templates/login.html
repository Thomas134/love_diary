<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登录 · 我们的恋爱日记</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes float {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-12px); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .float { animation: float 3s ease-in-out infinite; }
    .fade-up { animation: fadeUp .5s ease both; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center"
      style="background: linear-gradient(135deg, #fff0f3 0%, #ffe4e6 50%, #fce7f3 100%);">

  <!-- 装饰心形 -->
  <div class="fixed inset-0 pointer-events-none overflow-hidden select-none">
    <span class="absolute top-16 left-20 text-5xl opacity-20 float" style="animation-delay:0s">💕</span>
    <span class="absolute top-32 right-24 text-4xl opacity-15 float" style="animation-delay:.8s">🌸</span>
    <span class="absolute bottom-24 left-28 text-4xl opacity-20 float" style="animation-delay:1.4s">💗</span>
    <span class="absolute bottom-16 right-20 text-5xl opacity-15 float" style="animation-delay:.4s">🌷</span>
    <span class="absolute top-1/2 left-8 text-3xl opacity-10 float" style="animation-delay:1.8s">✨</span>
  </div>

  <!-- 登录卡片 -->
  <div class="fade-up relative z-10 bg-white/80 backdrop-blur-sm shadow-2xl rounded-3xl px-10 py-12 w-full max-w-sm
              border border-pink-100">
    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="text-6xl mb-3 float" style="display:inline-block">💝</div>
      <h1 class="text-2xl font-bold text-rose-500 tracking-wide">我们的恋爱日记</h1>
      <p class="text-sm text-pink-400 mt-1">记录每一个美好的瞬间</p>
    </div>

    <!-- Flash 消息 -->
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
        <div class="mb-4 px-4 py-2.5 rounded-xl text-sm font-medium text-center
          {% if category == 'error' %}bg-red-50 text-red-500 border border-red-200
          {% else %}bg-green-50 text-green-600 border border-green-200{% endif %}">
          {{ message }}
        </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <!-- 表单 -->
    <form method="POST" action="{{ url_for('login') }}">
      <div class="mb-6">
        <label class="block text-sm font-medium text-gray-600 mb-2">
          🔐 专属密码
        </label>
        <input
          type="password"
          name="password"
          placeholder="输入我们的专属密码..."
          autofocus
          required
          class="w-full px-4 py-3 rounded-2xl border border-pink-200 bg-pink-50/40
                 text-gray-700 placeholder-pink-300 focus:outline-none focus:ring-2
                 focus:ring-rose-300 focus:border-rose-300 transition text-sm"
        />
      </div>
      <button type="submit"
              class="w-full py-3 bg-gradient-to-r from-rose-400 to-pink-500 text-white
                     font-semibold rounded-2xl shadow-md hover:shadow-lg hover:from-rose-500
                     hover:to-pink-600 active:scale-95 transition-all duration-200">
        进入我们的空间 💕
      </button>
    </form>
  </div>
</body>
</html>
